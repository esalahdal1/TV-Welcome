<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ترحيب النزلاء</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .welcome-text {
            font-size: 2.5rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        .guest-name {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 30px;
            min-height: 1.2em;
        }
        .footer-text {
            font-size: 1.2rem;
            opacity: 0.6;
        }
        /* أنيميشن بسيط */
        .fade-in {
            animation: fadeIn 1.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container fade-in">
        <div class="welcome-text">مرحباً بك</div>
        <div id="guestName" class="guest-name">...</div>
        <div class="footer-text">نتمنى لك إقامة سعيدة</div>
    </div>

    <script>
        // إعدادات Supabase الخاصة بك
        const SUPABASE_URL = 'https://cewbmexcmhrogbvyfvrg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_MCDhff2Dztq4pp3ASoWX3A_inNp10mx';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchGuest() {
            const urlParams = new URLSearchParams(window.location.search);
            const room = urlParams.get('room');
            const nameElement = document.getElementById('guestName');

            if (!room) {
                nameElement.innerText = "أهلاً بك";
                return;
            }

            try {
                const { data, error } = await _supabase
                    .from('guests')
                    .select('full_name')
                    .eq('room_number', room)
                    .maybeSingle();

                if (error) throw error;

                if (data && data.full_name) {
                    nameElement.innerText = data.full_name;
                } else {
                    nameElement.innerText = "أهلاً بك";
                }
            } catch (err) {
                console.error('Error:', err);
                // لا نغير النص عند الخطأ ليبقى آخر اسم ناجح ظاهراً
            }
        }

        // تشغيل الجلب لأول مرة
        fetchGuest();

        // التحديث التلقائي كل 10 ثوانٍ
        setInterval(fetchGuest, 10000);
    </script>
</body>
</html>
